# Карта 301-редиректов для устаревших URL.
# Поддерживается вручную (в репозитории нет Node/npm).
# Формат: rewrite ^/old$ /new permanent;
# Файл копируется в образ как /etc/nginx/snippets/genshintop-redirects.conf
# и подключается из server{} в docker/nginx-default.conf (не conf.d — там контекст http).

# Опорный корпус гайдов (май 2026): архив content/guides-archive/, новые URL в content/guides/.
# Датированные и канонические страницы баннеров/патчей/ивентов старого дерева → тематические столпы.

# Легаси-монолит «Молитвы».
rewrite ^/guides/banner/?$ /guides/banners permanent;

# Префиксы старого плоского дерева → новые материалы (регулярные выражения проверяйте на коллизии с новыми slug).
rewrite ^/guides/banner-.+$ /guides/bannery-sobytiya-molitvy permanent;
rewrite ^/guides/update-.+$ /guides/obnovleniya-patch-notes permanent;
rewrite ^/guides/tier-list-.+$ /guides/tir-listy-kak-chitat permanent;
rewrite ^/guides/events-.+$ /guides/iventy-nagrady-vremya permanent;
rewrite ^/guides/domain-.+$ /guides/smola-domeny-raspisanie permanent;
rewrite ^/guides/bossy-.+$ /guides/bossy-materialy-talantov permanent;
rewrite ^/guides/tcg-.+$ /guides/tcg-vvod-svyashchennyy-prizyv permanent;
rewrite ^/guides/quest-.+$ /guides/kvesty-arhontov-bez-spoilerov permanent;

# Частые категории без единого префикса в старом корпусе.
rewrite ^/guides/genshin-updates-.+$ /guides/obnovleniya-patch-notes permanent;

# Остальные одноуровневые URL /guides/<slug>, не совпавшие с правилами выше и не входящие в новый корпус — на каталог гайдов.
rewrite ^/guides/(?!banners|codes|patches|newbie|economy|tier-list|events|tcg|domains|bosses|quests|bystriy-start-teyvat|uroven-priklyucheniya-sovety|oshibki-novichka|primogemy-kopim-tratim|molitvy-piti-zhurnal|tir-listy-kak-chitat|vitaya-bezdna-vvedenie|otryady-roli-elementy|iventy-nagrady-vremya|tcg-vvod-svyashchennyy-prizyv|smola-domeny-raspisanie|bossy-materialy-talantov|kvesty-arhontov-bez-spoilerov|promocodes|bannery-sobytiya-molitvy|obnovleniya-patch-notes|pc-mobilnaya-optimizaciya|artefakty-farm-i-vybor|oruzhie-vozvyshenie-materialy|issledovanie-mira-prioritety)[a-z0-9-]+$ /guides permanent;
