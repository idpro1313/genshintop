# Карта 301-редиректов для устаревших URL.
# Поддерживается вручную (в репозитории нет Node/npm).
# Формат: rewrite ^/old$ /new permanent;
# Файл копируется в образ как /etc/nginx/snippets/genshintop-redirects.conf

# Legacy hub routes
rewrite ^/guides/game-basics/?$ /guides/basics permanent;
rewrite ^/guides/advanced-guides/?$ /guides/advanced permanent;
rewrite ^/guides/quest-walkthroughs/?$ /guides/walkthroughs permanent;

# Legacy region routes
rewrite ^/regions/sumeru/?$ /world/regions/sumeru permanent;
rewrite ^/regions/fontaine/?$ /world/regions/fontaine permanent;
rewrite ^/regions/natlan/?$ /world/regions/natlan permanent;
rewrite ^/regions/?$ /world permanent;

# Fallbacks for other old flat guide URLs, leading to their hub
rewrite ^/guides/banner/?$ /guides/banners permanent;
rewrite ^/guides/banner-.+$ /guides/banners permanent;
rewrite ^/guides/update-.+$ /guides/patches permanent;
rewrite ^/guides/tier-list-.+$ /guides/tier-list permanent;
rewrite ^/guides/events-.+$ /guides/events permanent;
rewrite ^/guides/domain-.+$ /guides/domains permanent;
rewrite ^/guides/bossy-.+$ /guides/bosses permanent;
rewrite ^/guides/tcg-.+$ /guides/tcg permanent;
rewrite ^/guides/quest-.+$ /guides/quests permanent;
rewrite ^/guides/genshin-updates-.+$ /guides/patches permanent;

# Fallback for remaining flat guides that did not match any content guides
rewrite ^/guides/[a-z0-9-]+$ /guides permanent;
