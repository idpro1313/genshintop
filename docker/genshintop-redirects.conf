# Карта 301-редиректов для устаревших URL.
# Поддерживается вручную или внешним пайплайном (в репозитории нет Node/npm).
# Содержимое — набор `rewrite ^/old$ /new permanent;`
# Файл копируется в образ и подключается через include в docker/nginx-default.conf.

# Легаси-монолит «Молитвы» перенесён на индексируемый хаб баннеров (ИА, май 2026).
rewrite ^/guides/banner/?$ /guides/banners permanent;
