# GenshinTop: nginx + PHP-FPM (за Traefik TLS терминируется на прокси).
map $http_x_forwarded_proto $forwarded_scheme {
    https https;
    http http;
    default https;
}

map $http_x_forwarded_proto $fcgi_https {
    https on;
    default '';
}

server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;
    charset utf-8;
    absolute_redirect off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff2;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    include /etc/nginx/snippets/genshintop-redirects.conf*;

    # Дефолтный запрос браузера к /favicon.ico при rel=icon на favicon.svg
    location = /favicon.ico {
        rewrite ^ /favicon.svg last;
    }

    location ~* \.(xml|txt|webmanifest)$ {
        default_type application/octet-stream;
        types {
            application/xml xml;
            text/plain txt;
            application/manifest+json webmanifest;
        }
        try_files $uri =404;
    }

    location /og/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /fonts/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }

    location ~ \.(?:bak|log|old|orig|tmp)$ {
        return 404;
    }

    # Без $uri/: для GET / nginx видит каталог public/, ищет только index.html по умолчанию — 403 без index.php в цепочке.
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # НЕ делать return 301 с /index.php на / — цикл редиректов с try_files.
    # Только FastCGI: иначе nginx может отдать index.php как text/plain (в браузере «простыня» исходников).
    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS $fcgi_https;
        fastcgi_pass 127.0.0.1:9000;
    }

    # Любые другие .php под web-root не обслуживаем (в public должен быть только index.php).
    location ~ \.php$ {
        deny all;
    }
}