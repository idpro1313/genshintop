server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;

    # ----- Сжатие -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/atom+xml
        application/xml
        image/svg+xml
        font/woff2;

    # gzip_static и Brotli включаются автоматически, если модули скомпилированы в nginx.
    # Эти директивы безопасно игнорируются, если модулей нет.

    # ----- Безопасность / SEO заголовки -----
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # 301-редиректы для устаревших URL (старые кириллические slug → латиница).
    # Файл генерируется скриптом scripts/enrich-guides.ts.
    include /etc/nginx/conf.d/genshintop-redirects.conf*;

    # Sitemap, robots и прочие «не-страницы»: не подменять index.html (иначе краулеры и внешние клиенты получают HTML вместо XML/ошибки).
    location ~* \.(xml|txt|webmanifest)$ {
        default_type application/octet-stream;
        types {
            application/xml xml;
            text/plain txt;
            application/manifest+json webmanifest;
        }
        try_files $uri =404;
    }

    # Хешированные ассеты Astro (в имени уже есть hash) — кешируем агрессивно.
    location /_astro/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Сгенерированные OG-картинки.
    location /og/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Шрифты (локальные, woff2).
    location /fonts/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*" always;
    }

    location / {
        # SSG Astro: соответствие путей без SPA-fallback на главную для несуществующих URL.
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    # Прочая статика (картинки/иконки) — недельный кеш.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
