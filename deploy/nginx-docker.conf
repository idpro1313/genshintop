server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml text/xml;

    # Sitemap, robots и прочие «не-страницы»: не подменять index.html (иначе краулеры и внешние клиенты получают HTML вместо XML/ошибки).
    location ~* \.(xml|txt|webmanifest)$ {
        default_type application/octet-stream;
        types {
            application/xml xml;
            text/plain txt;
            application/manifest+json webmanifest;
        }
        try_files $uri =404;
    }

    location / {
        # SSG Astro: соответствие путей без SPA-fallback на главную для несуществующих URL.
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
